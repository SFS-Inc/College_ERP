{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-lg border-danger">
            <div class="card-header bg-danger text-white fw-bold">
                <i class="fa-solid fa-triangle-exclamation me-2"></i> Confirm Deletion
            </div>
            <div class="card-body p-4 text-center">
                <h4 class="mb-3 text-dark">Are you sure?</h4>
                <p class="text-muted mb-4">
                    You are about to delete the {{ type }}: <br>
                    <strong class="text-danger fs-5">{{ object.name }}</strong>
                </p>
                
                <div class="alert alert-warning small">
                    <i class="fa-solid fa-circle-info me-1"></i>
                    This action cannot be undone. All related data (chapters, topics) will also be deleted.
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <a href="javascript:history.back()" class="btn btn-light border px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4 fw-bold">
                            Yes, Delete It
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
