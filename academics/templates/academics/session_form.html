{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-white py-3 border-0">
                <h4 class="mb-0 fw-bold">{{ title }}</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Session Name</label>
                        {{ form.name }}
                        <div class="form-text">e.g., "December 2025" or "2025-2026"</div>
                    </div>

                    <div class="mb-4 form-check">
                        {{ form.is_active }}
                        <label class="form-check-label text-dark" for="id_is_active">
                            Set as Active immediately?
                        </label>
                        <div class="form-text text-danger small">
                            Warning: This will archive the current session.
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">Create Session</button>
                        <a href="{% url 'manage_sessions' %}" class="btn btn-light text-muted rounded-pill">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
